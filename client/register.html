<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Lordran Archives</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="ember-particles" id="particles"></div>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo-area">
        <div class="bonfire-icon">🔥</div>
        <div>
          <h1 class="site-title"><a href="index.html" style="color:inherit;text-decoration:none">Lordran Archives</a></h1>
          <p class="site-subtitle">A compendium of all things Dark Souls</p>
        </div>
      </div>
    </div>
  </header>

  <div class="auth-page">
    <div class="auth-card">
      <h2 class="auth-title">Rise, Undead</h2>
      <p class="auth-subtitle">Create your account</p>

      <div id="errorMsg" class="error-msg" style="display:none"></div>
      <div id="successMsg" class="success-msg" style="display:none"></div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-input" placeholder="Choose your name">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirm" class="form-input" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="doRegister()">Begin Your Journey</button>

      <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    async function doRegister() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (!username || !password) {
        errorMsg.textContent = 'Please fill in all fields.';
        errorMsg.style.display = 'block';
        return;
      }

      if (password !== confirm) {
        errorMsg.textContent = 'Passwords do not match.';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.message || 'Registration failed.';
          errorMsg.style.display = 'block';
          return;
        }

        successMsg.textContent = 'Account created! Redirecting...';
        successMsg.style.display = 'block';
        setTimeout(() => window.location.href = 'login.html', 1500);

      } catch (err) {
        errorMsg.textContent = 'Could not reach the server.';
        errorMsg.style.display = 'block';
      }
    }
  </script>
</body>
</html>
