<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Lordran Archives</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="ember-particles" id="particles"></div>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo-area">
        <div class="bonfire-icon">🔥</div>
        <div>
          <h1 class="site-title"><a href="index.html" style="color:inherit;text-decoration:none">Lordran Archives</a></h1>
          <p class="site-subtitle">Operator Dashboard</p>
        </div>
      </div>
      <nav class="header-nav">
        <a href="index.html" class="nav-link">Archives</a>
        <a href="#" class="nav-link" onclick="logout()">Logout</a>
      </nav>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-section">
        <h3 class="sidebar-title">Dashboard</h3>
        <ul class="category-list">
          <li class="category-item active" onclick="showTab('pending')">
            <span class="cat-icon">⏳</span> Pending
          </li>
          <li class="category-item" onclick="showTab('approved')">
            <span class="cat-icon">✅</span> Approved
          </li>
        </ul>
      </div>
      <div class="sidebar-section">
        <p class="sidebar-username" id="dashUser"></p>
        <p class="sidebar-username" id="dashRole" style="color: var(--gold); font-size:0.8rem;"></p>
      </div>
    </aside>

    <main class="main-content">
      <div id="accessDenied" style="display:none" class="page-header">
        <h2 class="page-title">Access Denied</h2>
        <p style="color:var(--text-muted)">You must be an Operator or Admin to view this page.</p>
        <a href="login.html" class="btn-primary" style="display:inline-block;margin-top:16px;">Login</a>
      </div>

      <div id="dashboardContent">
        <div class="page-header">
          <h2 class="page-title" id="tabTitle">Pending Submissions</h2>
        </div>
        <div id="itemsList" class="items-grid">
          <div class="loading">Loading submissions...</div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    const username = localStorage.getItem('username');

    if (!token || (role !== 'operator' && role !== 'admin')) {
      document.getElementById('dashboardContent').style.display = 'none';
      document.getElementById('accessDenied').style.display = 'block';
    } else {
      document.getElementById('dashUser').textContent = username;
      document.getElementById('dashRole').textContent = role.toUpperCase();
      loadPending();
    }

    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }

    function showTab(tab) {
      document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
      event.target.closest('.category-item').classList.add('active');
      if (tab === 'pending') {
        document.getElementById('tabTitle').textContent = 'Pending Submissions';
        loadPending();
      } else {
        document.getElementById('tabTitle').textContent = 'Approved Items';
        loadApproved();
      }
    }

    async function loadPending() {
      const res = await fetch(`${API}/items/pending`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const items = await res.json();
      renderDashItems(items, true);
    }

    async function loadApproved() {
      const res = await fetch(`${API}/items`);
      const items = await res.json();
      renderDashItems(items, false);
    }

    function renderDashItems(items, isPending) {
      const container = document.getElementById('itemsList');
      if (!items.length) {
        container.innerHTML = '<p style="color:var(--text-muted); padding:20px;">No items found.</p>';
        return;
      }

      container.innerHTML = items.map(item => `
        <div class="item-card" id="card-${item.id}">
          ${item.image ? `<img src="${item.image}" class="item-image">` : ''}
          <div class="item-body">
            <span class="item-category">${item.category.replace('_', ' ')}</span>
            <h3 class="item-name">${item.name}</h3>
            <p class="item-desc">${item.description}</p>
            <div class="dash-actions">
              ${isPending ? `<button class="btn-approve" onclick="approveItem(${item.id})">Approve</button>` : ''}
              <button class="btn-delete" onclick="deleteItem(${item.id})">Delete</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    async function approveItem(id) {
      await fetch(`${API}/items/approve/${id}`, {
        method: 'PUT',
        headers: { Authorization: `Bearer ${token}` }
      });
      document.getElementById(`card-${id}`).remove();
    }

async function redactItem(id) {
  if (!confirm('Are you sure you want to redact this entry?')) return;
  await fetch(`${API}/items/${id}`, {
    method: 'DELETE',
    headers: { Authorization: `Bearer ${token}` }
  });
  document.getElementById(`card-${id}`).remove();
}
    async function deleteItem(id) {
      if (!confirm('Are you sure you want to delete this entry?')) return;
      await fetch(`${API}/items/${id}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${token}` }
      });
      document.getElementById(`card-${id}`).remove();
    }
  </script>
</body>
</html>
